name: Cal Water Bill Sync

on:
  schedule:
    # Runs daily at 9 AM UTC on days 23-28 of each month
    - cron: '0 9 23-28 * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  sync-bill:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run Cal Water bill sync
        env:
          CALWATER_EMAIL: ${{ secrets.CALWATER_EMAIL }}
          CALWATER_PASSWORD: ${{ secrets.CALWATER_PASSWORD }}
          CALWATER_COOKIES: ${{ secrets.CALWATER_COOKIES }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_FOLDER_PATH: ${{ vars.ONEDRIVE_FOLDER_PATH }}
        run: python download_water_bill.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: downloads/calwater_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload downloaded bill
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bill-pdf
          path: downloads/calwater_bill_*.pdf
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: pipeline.log
          retention-days: 7
          if-no-files-found: ignore
