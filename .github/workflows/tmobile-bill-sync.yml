name: T-Mobile Bill Sync

on:
  schedule:
    # Runs daily at 9 AM UTC on days 23-28 of each month
    - cron: '0 9 23-28 * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  sync-bill:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run T-Mobile bill sync
        env:
          TMOBILE_EMAIL: ${{ secrets.TMOBILE_EMAIL }}
          TMOBILE_PASSWORD: ${{ secrets.TMOBILE_PASSWORD }}
          TMOBILE_COOKIES: ${{ secrets.TMOBILE_COOKIES }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python download_bill.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: downloads/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload downloaded bill
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bill-pdf
          path: downloads/tmobile_bill_*.pdf
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: pipeline.log
          retention-days: 7
          if-no-files-found: ignore
